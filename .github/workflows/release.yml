name: Release

# When a version tag (v1330.0.0, v1330.1.0, …) is pushed, build the extension
# package and attach it to a GitHub Release. SubVibe has NO build step, so this
# zip is exactly the source at that tag — anyone can download it and verify it
# against the published Chrome Web Store extension (see README ▸ verifiable builds).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write        # required to create the release

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the tagged source
        uses: actions/checkout@v4

      - name: Build the package (no build step — just zips the source)
        run: bash build.sh

      - name: Publish (or refresh) the GitHub Release with the package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="Reproducible package, built from this tag by \`build.sh\`. SubVibe has no build step — the files in this zip are exactly the source at \`$GITHUB_REF_NAME\`. Verify against the published extension per the README."
          # Idempotent: works whether or not a release for this tag already exists
          # (so re-pushing a tag — e.g. to sign it — won't fail the workflow).
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" subvibe-*.zip --clobber
          else
            gh release create "$GITHUB_REF_NAME" subvibe-*.zip --title "SubVibe $GITHUB_REF_NAME" --notes "$NOTES"
          fi
